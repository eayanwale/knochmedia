<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Title is overwritten by project-page.js once the project is resolved -->
    <title>Project — Knoch Media</title>

    <meta name="description" content="A Knoch Media project — full gallery, metadata, and inquiry path." />
    <meta name="theme-color" content="#0a0a0a" />

    <!-- Open Graph / social share (KNOCH-019). Per-project enrichment is
         deferred — project.html is dynamically rendered from URL params, and
         a per-project og:image swap would need server-side rendering or a
         static-rendered /project/<slug> route. The studio-default fallback
         is good enough for an MVP. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Knoch Media" />
    <meta property="og:title" content="Project — Knoch Media" />
    <meta property="og:description" content="A Knoch Media project — full gallery, metadata, and inquiry path." />
    <meta property="og:image" content="https://knochmedia.xyz/assets/og/og-default.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Project — Knoch Media" />
    <meta name="twitter:description" content="A Knoch Media project — full gallery, metadata, and inquiry path." />
    <meta name="twitter:image" content="https://knochmedia.xyz/assets/og/og-default.jpg" />

    <meta name="sanity-project-id" content="2779g58e" />
    <meta name="sanity-dataset" content="production" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;1,9..144,400&family=Inter+Tight:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap"
    />

    <link rel="stylesheet" href="/css/global.css" />
    <link rel="stylesheet" href="/css/chrome.css" />
    <link rel="stylesheet" href="/css/cursor.css" />
    <link rel="stylesheet" href="/css/video-lightbox.css" />
    <link rel="stylesheet" href="/css/project-page.css" />
    <!-- Shared footer — sitemap variant (KNOCH-015) -->
    <link rel="stylesheet" href="/css/footer.css" />
  </head>
  <body>

    <!--
      Black veil — fades from opaque to transparent on page load to
      bridge the expanding-tile transition from the previous page.
      Inline style sets initial state so the veil is visible before
      JS boots and tweens it out.
    -->
    <div class="project-veil" style="opacity:1" aria-hidden="true"></div>

    <!-- Custom cursor (KNOCH-004) -->
    <div class="cursor" id="cursor" aria-hidden="true"></div>

    <!--
      Chrome navigation overlay — same component as other pages.
      Plain hrefs everywhere on this page so all links are real
      cross-page navigations.
    -->
    <div class="chrome" id="chrome">
      <div class="chrome-grid">

        <a class="mark" href="/" aria-label="Knoch Media — back to home">
          <img class="mark-logo" src="/assets/logo/logo.webp" alt="" aria-hidden="true"
               onerror="this.parentNode.classList.add('mark-fallback'); this.remove();" />
          <span class="mark-text">Knoch<span class="dot" aria-hidden="true">.</span></span>
        </a>

        <nav class="nav-center" aria-label="Main navigation">
          <a href="/portfolio.html" aria-current="page">Work</a>
          <a href="/about.html">Studio</a>
          <a href="/contact.html">Inquire</a>
        </nav>

        <div class="nav-right" aria-hidden="true">
          <span class="rec-dot"></span>
          <span>REC · <span id="tc">00:00:00</span></span>
        </div>

        <!-- Mobile hamburger toggle (KNOCH-020) -->
        <button class="nav-toggle" type="button"
                aria-label="Open navigation"
                aria-expanded="false"
                aria-controls="nav-overlay">
          <span class="nav-toggle-line" aria-hidden="true"></span>
          <span class="nav-toggle-line" aria-hidden="true"></span>
          <span class="nav-toggle-line" aria-hidden="true"></span>
        </button>

      </div>
    </div>

    <!-- Mobile nav overlay (KNOCH-020) — populated by chrome.js -->
    <nav class="nav-overlay" id="nav-overlay" aria-hidden="true" aria-label="Mobile navigation">
      <div class="nav-overlay-inner"></div>
    </nav>

    <!-- Bottom timecode bar -->
    <div class="timecode-bar" aria-hidden="true">
      <span>K/M · 2026 · MARYLAND</span>
      <div class="scroll-progress"
           id="scroll-progress"
           role="progressbar"
           aria-valuenow="0"
           aria-valuemin="0"
           aria-valuemax="100"
           aria-label="Page scroll progress"></div>
      <span id="frame-display">FRAME 01 / 36</span>
    </div>

    <!--
      Hero — full-bleed image + title overlay. project-page.js sets
      the bg-image style on .project-hero-img and rewrites the meta /
      title / sub strings from the project data lookup.
    -->
    <section class="project-hero" aria-label="Project hero">

      <!-- Back link sits on top of the hero, top-left -->
      <div class="project-back-wrap">
        <a class="project-back" href="/portfolio.html">&larr; Back to work</a>
      </div>

      <div class="project-hero-img" role="img" aria-hidden="true"></div>

      <div class="project-hero-content">
        <p class="project-hero-meta">— PROJECT</p>
        <h1 class="project-hero-title">Loading&hellip;</h1>
        <p class="project-hero-sub"></p>
      </div>

    </section>

    <!--
      Body — single centred metadata column. The previous KNOCH-012
      build had a 2-col grid with a gallery of project images on the
      left, but the placeholder images repeated across projects and
      didn't carry information beyond the cover. KNOCH-036 replaced
      the gallery with the "Other works" reel below, leaving this
      section for the project-specific metadata only.
    -->
    <section class="project-body" aria-label="Project details">
      <div class="project-body-inner">

        <aside class="project-meta">
          <span class="project-meta-cat">PROJECT</span>
          <h2 class="project-meta-title">Loading&hellip;</h2>
          <p class="project-meta-sub"></p>
          <dl class="project-meta-spec">
            <!-- populated by project-page.js -->
          </dl>
          <p class="project-meta-desc"></p>
          <a class="project-meta-link" href="#">View full gallery &rarr;</a>
        </aside>

      </div>
    </section>

    <!--
      Other works reel (KNOCH-036) — pinned horizontal-scroll reel
      matching the homepage Selected Work pattern (KNOCH-007). The
      section pins for the duration of the horizontal track; the track
      (.project-gallery) translates leftward as the visitor scrolls,
      then the pin releases at the end and vertical scroll resumes.

      Layout: the intro panel ("Keep looking.") is the first item of
      the same horizontal track, mirroring how .reel-intro sits as
      the first panel of .reel-track on the homepage. project-page.js
      appends the project cards + a trailing spacer after the intro
      panel and wires the GSAP pin.
    -->
    <section class="project-others" aria-label="Other works">
      <div class="project-gallery" aria-label="Other Knoch Media projects">
        <div class="project-others-intro">
          <p class="project-others-meta">— OTHER WORK</p>
          <h2 class="project-others-headline headline-hover">Keep <em>looking.</em></h2>
          <p class="project-others-desc">More from the studio &mdash;<br>scroll to keep browsing.</p>
        </div>
        <!-- card panels appended by project-page.js -->
      </div>
    </section>

    <!--
      Closing CTA — links to the homepage's #cta section so the
      inquiry form (KNOCH-014, currently a placeholder) handles the
      conversion. KNOCH-014 will eventually accept a ?type= URL param
      pre-fill — the AC for that already exists.
    -->
    <section class="project-cta" aria-label="Inquire about a similar project">
      <h2 class="project-cta-headline">Book a similar project.</h2>
      <a class="project-cta-link" href="/contact.html">Start an inquiry &rarr;</a>
    </section>

    <!-- Shared footer host (KNOCH-015) — populated by initFooter('expanded') -->
    <footer id="site-footer"></footer>

    <script type="module" src="/js/project-main.js"></script>
  </body>
</html>
