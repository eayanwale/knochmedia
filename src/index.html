<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Knoch — A Working Studio</title>

    <!-- Primary meta -->
    <meta name="description" content="Knoch Media — cinematic photography and visual storytelling studio." />

    <!--
      Google Fonts — preconnect both origins before the stylesheet request
      so DNS + TLS handshakes are done by the time the browser parses the
      <link rel="stylesheet"> below. crossorigin is required on the static
      origin because font files are fetched with CORS.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!--
      Font families in load order: Fraunces (display/headlines) → JetBrains
      Mono (UI chrome, labels) → Inter Tight (body copy). All weights that
      will be used across the design system are requested in a single URL to
      minimise the number of Google Fonts round-trips.

      Fraunces: optical size axis (opsz 9..144) + italic for editorial pull-
      quotes. Weights 300 and 400 cover the --font-serif token variants.
      JetBrains Mono: 400 + 500 for timecodes and nav labels (KNOCH-003).
      Inter Tight: 400 + 500 for body and UI copy (KNOCH-002).
      &display=swap keeps LCP fast — text renders in the fallback font while
      the web font loads, then swaps once the FOUT window closes.
    -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;1,9..144,400&family=Inter+Tight:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap"
    />

    <!-- Global design-token stylesheet (KNOCH-002) -->
    <link rel="stylesheet" href="/src/css/global.css" />
    <!-- Chrome navigation overlay (KNOCH-003) -->
    <link rel="stylesheet" href="/src/css/chrome.css" />
  </head>
  <body>

    <!--
      Chrome navigation overlay — fixed full-viewport layer.
      pointer-events: none on .chrome itself; children opt back in.
      mix-blend-mode: difference inverts the white text automatically
      over any background — no JS color-switching needed.
      KNOCH-005 (loader) will fade this in after the intro completes.
    -->
    <div class="chrome" id="chrome">
      <div class="chrome-grid">

        <!-- Wordmark / logo -->
        <a class="mark" href="/" aria-label="Knoch — scroll to top">Knoch<span class="dot" aria-hidden="true">.</span></a>

        <!-- Center nav — hidden on mobile ≤800px -->
        <nav class="nav-center" aria-label="Main navigation">
          <a href="#reel"  data-scroll-to="#reel">Work</a>
          <a href="#frame" data-scroll-to="#frame">Studio</a>
          <a href="#cta"   data-scroll-to="#cta">Inquire</a>
        </nav>

        <!-- REC timecode indicator — cosmetic, aria-hidden -->
        <div class="nav-right" aria-hidden="true">
          <span class="rec-dot"></span>
          <span>REC · <span id="tc">00:00:00</span></span>
        </div>

      </div>
    </div>

    <!--
      Bottom timecode bar — cosmetic chrome, aria-hidden.
      scroll-progress is a progressbar for AT users despite the cosmetic context.
    -->
    <div class="timecode-bar" aria-hidden="true">
      <span>K/M · 2026 · MARYLAND</span>
      <div class="scroll-progress"
           id="scroll-progress"
           role="progressbar"
           aria-valuenow="0"
           aria-valuemin="0"
           aria-valuemax="100"
           aria-label="Page scroll progress"></div>
      <span id="frame-display">FRAME 01 / 36</span>
    </div>

    <!-- Page content will be built here -->

    <!--
      Main JS entry — Vite resolves this as an ES module. GSAP ScrollTrigger
      and Lenis will be imported here once KNOCH-002 (tokens) and KNOCH-016
      (smooth scroll) are implemented. Using type="module" gives us top-level
      await, import.meta, and automatic defer behaviour.
    -->
    <script type="module" src="/src/js/main.js"></script>
  </body>
</html>
