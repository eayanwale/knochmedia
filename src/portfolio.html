<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Work — Knoch Media</title>

    <!-- Primary meta -->
    <meta name="description" content="The full Knoch Media portfolio — weddings, brand films, sports, portraits. Filter by category to explore the work." />
    <link rel="canonical" href="https://knoch.media/portfolio.html" />

    <!-- Open Graph / social share (KNOCH-019) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Knoch Media" />
    <meta property="og:title" content="The Work — Knoch Media" />
    <meta property="og:description" content="The full portfolio — weddings, brand films, music, portraits. Filter to explore." />
    <meta property="og:url" content="https://knoch.media/portfolio.html" />
    <meta property="og:image" content="https://knoch.media/assets/og/og-default.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="The Work — Knoch Media" />
    <meta name="twitter:description" content="The full portfolio — weddings, brand films, music, portraits." />
    <meta name="twitter:image" content="https://knoch.media/assets/og/og-default.jpg" />
    <meta name="theme-color" content="#0a0a0a" />

    <!-- Favicon set — SVG for modern browsers, PNG fallback, apple-touch for iOS home-screen -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Sanity CMS config (KNOCH-023) — kept consistent across pages -->
    <meta name="sanity-project-id" content="2779g58e" />
    <meta name="sanity-dataset" content="production" />

    <!-- Same Google Fonts as the homepage / about page -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;1,9..144,400&family=Inter+Tight:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap"
    />

    <!-- Global tokens + shared chrome / cursor + page-specific styles -->
    <link rel="stylesheet" href="/css/global.css" />
    <link rel="stylesheet" href="/css/chrome.css" />
    <link rel="stylesheet" href="/css/cursor.css" />
    <link rel="stylesheet" href="/css/video-lightbox.css" />
    <link rel="stylesheet" href="/css/portfolio-page.css" />
    <!-- Shared footer — sitemap variant (KNOCH-015) -->
    <link rel="stylesheet" href="/css/footer.css" />

    <!--
      KNOCH-042: dropped the cover-alex-morgan.webp LCP preload now
      that tiles are Sanity-driven at runtime — the LCP image varies
      per Sanity entry and per filter state, so a static preload no
      longer maps to anything. Worth ~50–100 ms LCP delay on first
      paint; acceptable trade for content-driven flexibility.
    -->
  </head>
  <body>

    <!-- Skip-to-content link (KNOCH-021) — first focusable, slides in on focus -->
    <a class="skip-link" href="#main-content">Skip to content</a>

    <!-- Custom cursor — desktop ring (KNOCH-004) -->
    <div class="cursor" id="cursor" aria-hidden="true"></div>

    <!--
      Chrome navigation overlay — same component as the rest of the site.
      All anchor links here are real cross-page hrefs, so chrome.js's
      .mark same-page guard correctly lets the browser navigate when the
      user clicks the wordmark.
    -->
    <div class="chrome" id="chrome">
      <div class="chrome-grid">

        <a class="mark" href="/" aria-label="Knoch — back to home">Knoch<span class="dot" aria-hidden="true">.</span></a>

        <nav class="nav-center" aria-label="Main navigation">
          <a href="/portfolio.html" aria-current="page">Work</a>
          <a href="/about.html">Studio</a>
          <a href="/contact.html">Inquire</a>
        </nav>

        <div class="nav-right" aria-hidden="true">
          <span class="rec-dot"></span>
          <span>REC · <span id="tc">00:00:00</span></span>
        </div>

        <!-- Mobile hamburger toggle (KNOCH-020) -->
        <button class="nav-toggle" type="button"
                aria-label="Open navigation"
                aria-expanded="false"
                aria-controls="nav-overlay">
          <span class="nav-toggle-line" aria-hidden="true"></span>
          <span class="nav-toggle-line" aria-hidden="true"></span>
          <span class="nav-toggle-line" aria-hidden="true"></span>
        </button>

      </div>
    </div>

    <!-- Mobile nav overlay (KNOCH-020) — populated by chrome.js -->
    <nav class="nav-overlay" id="nav-overlay" aria-hidden="true" aria-label="Mobile navigation">
      <div class="nav-overlay-inner"></div>
    </nav>

    <!-- Bottom timecode bar — cosmetic chrome -->
    <div class="timecode-bar" aria-hidden="true">
      <span>K/M · 2026 · MARYLAND</span>
      <div class="scroll-progress"
           id="scroll-progress"
           role="progressbar"
           aria-valuenow="0"
           aria-valuemin="0"
           aria-valuemax="100"
           aria-label="Page scroll progress"></div>
      <span id="frame-display" aria-hidden="true">FRAME 01 / 36</span>
    </div>

    <main id="main-content">

    <!--
      Page hero — left column has the meta label + headline,
      right column has the filter tabs. Stacks on mobile and
      the tabs row becomes horizontally scrollable.
    -->
    <section class="portfolio-hero" aria-label="Portfolio">
      <div class="portfolio-hero-inner">

        <div class="portfolio-hero-text">
          <p class="portfolio-hero-meta">— THE WORK</p>
          <h1 class="portfolio-hero-headline headline-hover">The <em>work.</em></h1>
        </div>

        <!--
          Filter tabs — KNOCH-042: per-category buttons appended at
          runtime by portfolio-cms.js based on which categories are
          present in Sanity. The "All" button stays in the static
          markup so the filter logic always has its always-true
          match even if the Sanity fetch fails.
        -->
        <ul class="portfolio-tabs" role="tablist" aria-label="Filter portfolio by category">
          <li role="presentation"><button class="portfolio-tab is-active" data-filter="all" role="tab" aria-selected="true" tabindex="0">All</button></li>
        </ul>

      </div>
    </section>

    <!--
      Portfolio grid — KNOCH-042: tiles populated at runtime from
      Sanity galleryCollection entries (source of truth) by
      src/js/portfolio-cms.js. Adding a new client gallery is a
      Sanity-only operation — no code change here is required.

      Click routing: tile-router.js reads data-link-type + data-url
      directly off each tile. external-gallery → opens Pic-Time URL
      in a new tab; youtube → opens the lightbox; internal-page →
      navigates to /project/<slug> static page (KNOCH-040).
    -->
    <section class="portfolio-grid-wrap" aria-label="Portfolio grid">
      <div class="portfolio-grid">
        <!-- Tiles populated at runtime by portfolio-cms.js -->
      </div><!-- /.portfolio-grid -->

      <!--
        Meta row — count label + Load more button. JS owns both:
        the count rewrites on filter / load-more change, and the
        button hides itself when shown >= matched.
        With 8 cards total, all fit in the initial PAGE_SIZE — the
        Load more button stays hidden after init via updateMeta.
      -->
      <div class="portfolio-meta">
        <p class="portfolio-count" role="status" aria-live="polite">
          Showing <strong>8</strong> of 8 projects
        </p>
        <button class="portfolio-load-more is-hidden" type="button">Load more &rarr;</button>
      </div>

    </section>

    </main><!-- /#main-content -->

    <!-- Shared footer host (KNOCH-015) — populated by initFooter('expanded') -->
    <footer id="site-footer"></footer>

    <script type="module" src="/js/portfolio-main.js"></script>
  </body>
</html>
